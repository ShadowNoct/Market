<!DOCTYPE html>
<html lang="en">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>StoneHaven Exchange v4.2</title>
  <link rel="stylesheet" href="style.css?v=4.2" />
</head>
